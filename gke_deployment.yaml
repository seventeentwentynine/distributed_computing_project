apiVersion: apps/v1
kind: Deployment
metadata:
  name: roberta-news-classifier
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: roberta-news-classifier
  template:
    metadata:
      labels:
        app: roberta-news-classifier
    spec:
      terminationGracePeriodSeconds: 120
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      containers:
        - name: frontend
          image: us-central1-docker.pkg.dev/cybersectest-{ACCOUNT}/ml-repo/fastapi-frontend:v1
          ports:
            - containerPort: 8080
          env:
            - name: TRITON_URL
              value: "localhost:8001"
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            failureThreshold: 30

        - name: triton-backend
          image: us-central1-docker.pkg.dev/cybersectest-{ACCOUNT}/ml-repo/triton-sidecar:v1
          ports:
            - containerPort: 8000
            - containerPort: 8001
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: roberta-news-classifier
  annotations:
    cloud.google.com/backend-config: '{"default":"roberta-news-classifier-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: roberta-news-classifier
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: roberta-news-classifier-backendconfig
spec:
  timeoutSec: 300
  connectionDraining:
    drainingTimeoutSec: 60
  healthCheck:
    type: HTTP
    requestPath: /healthz
    port: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roberta-news-classifier
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:
    service:
      name: roberta-news-classifier
      port:
        number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: roberta-news-classifier
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: roberta-news-classifier
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70